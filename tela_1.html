<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="tela_1.css">
    <title>Tela 1</title>
</head>

<body>
    <div class="flex">
        <div class="bloco_inicio padrao_fundo">

            <div class="left">
                <img src="https://lumiere-a.akamaihd.net/v1/images/cars_el_rayo_mcqueen_8e654f62.jpeg?region=0,0,1595,895"
                    class="mcqueen">

                <div class="text">
                    <h1>Olá, tudo bem?</h1>
                    <p>Como posso te ajudar hoje?</p>
                    <button class="btn-main">Fale comigo!</button>
                </div>
            </div>

            <div class="right">
                <button class="btn">QUERO COMPRAR MATERIAL</button>
                <button class="btn">QUERO COMPRAR SERVIÇO</button>
                <button class="btn">CONSULTAR FLUXO DE PROCESSOS</button>
                <button class="btn">STATUS DAS MINHAS REQUISIÇÕES</button>
                <button class="btn">NÃO SEI AO CERTO, ME AJUDE</button>
            </div>
        </div>

        <div class="padrao_fundo" id="status_pedidos">
            <div class="cabecalho_divs flex">
                <h2>Status de pedidos recentes</h2>
                <div class="flex">
                    <p>ver todos pedidos</p>
                    <i class="fa-sharp-duotone fa-solid fa-circle-plus"
                        style="--fa-primary-color: rgb(2, 62, 167); --fa-secondary-color: rgb(254, 254, 255); --fa-secondary-opacity: 1;"></i>
                </div>
            </div>

            <table class="tabela_pedidos">
                <thead class="cabecalho_tabela">
                    <tr>
                        <th>Nº Req</th>
                        <th>Data</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr class="conteudo_tabela">
                        <th>#125</th>
                        <th>20/04/2020</th>
                        <th>R$ 1250,50</th>
                        <th class="status processando"><p>Processado</p></th>
                    </tr>
                    <tr class="cabecalho_tabela">
                        <th>#125</th>
                        <th>20/04/2020</th>
                        <th>R$ 1250,50</th>
                        <th class="status analise"><p>Analise</p></th>
                    </tr>
                    <tr class="cabecalho_tabela">
                        <th>#125</th>
                        <th>20/04/2020</th>
                        <th>R$ 1250,50</th>
                        <th class="status realizar"><p>Realizar</p></th>
                    </tr>
                    <tr class="cabecalho_tabela">
                        <th>#125</th>
                        <th>20/04/2020</th>
                        <th>R$ 1250,50</th>
                        <th class="status processando"><p>Processado</p></th>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="flex">
        <div class="padrao_fundo" id="ultimas_compras">

        </div>
        <div class="padrao_fundo" id="mensagens_alertas">

        </div>
    </div>

    <div class="flex">
        <div class="padrao_fundo" id="utimas_requisisoes">

        </div>
        <div class="padrao_fundo" id="transacoes_pedidos">

        </div>
    </div>

    <div>
</body>

</html>
